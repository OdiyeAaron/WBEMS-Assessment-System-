{% extends "base.html" %}
{% block title %}Log Attendance for {{ student.name }}{% endblock %}

{% block content %}
<div class="container">
    <h1>Log Attendance: {{ student.name }}</h1>
    <p class="lead">Record attendance for {{ student.name }} for a specific date.</p>

    <div class="form-box">
        <form action="{{ url_for('record_attendance', student_id=student.id) }}" method="POST">
            
            <div class="form-group">
                <label for="date">Date *</label>
                <input type="date" name="date" id="date" required>
            </div>

            <div class="form-group">
                <label for="status">Status *</label>
                <select name="status" id="status" required>
                    <option value="Present">Present</option>
                    <option value="Absent">Absent</option>
                    <option value="Late">Late</option>
                    <option value="Excused">Excused</option>
                </select>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Attendance</button>
                <a href="{{ url_for('student_profile', student_id=student.id) }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
    // Set default date to today's date for convenience
    document.addEventListener('DOMContentLoaded', (event) => {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0'); // Months start at 0
        const dd = String(today.getDate()).padStart(2, '0');
        const formattedDate = `${yyyy}-${mm}-${dd}`;
        document.getElementById('date').value = formattedDate;
    });
</script>
{% endblock %}
