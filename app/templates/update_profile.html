{% extends "base.html" %}

{% block content %}
    <h2>✏️ Update Profile for {{ student.name }}</h2>
    
    <p><a href="{{ url_for('student_dashboard', student_id=student.id) }}">&larr; Back to Student Dashboard</a></p>

    <div class="form-container">
        <form method="POST" action="{{ url_for('update_student_profile', student_id=student.id) }}">
            
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" value="{{ student.name }}" required>
            </div>

            <div class="form-group">
                <label for="level">Level:</label>
                <input type="text" id="level" name="level" value="{{ student.level }}" required>
            </div>

            <div class="form-group">
                <label for="course">Course:</label>
                <input type="text" id="course" name="course" value="{{ student.course or '' }}">
            </div>

            <div class="form-group">
                <label for="academic_performance">Academic Performance (%):</label>
                <input type="number" id="academic_performance" name="academic_performance" value="{{ student.academic_performance }}" min="0" max="100" step="0.1" required>
            </div>

            <button type="submit" class="btn-primary">Save Changes</button>
        </form>
    </div>

    <style>
        .form-container {
            max-width: 600px;
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
    </style>
{% endblock %}
