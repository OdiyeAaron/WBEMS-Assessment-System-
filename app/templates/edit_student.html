{% extends "base.html" %}
{% block title %}Edit {{ student.name }}{% endblock %}

{% block content %}
<div class="container">
    <h1>Edit Student Profile: {{ student.name }}</h1>

    <form action="{{ url_for('update_student', student_id=student.id) }}" method="POST" class="add-student-form">

        <fieldset>
            <legend>Basic & Registration Info</legend>
            <div class="form-group-row">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" value="{{ student.name }}" required>
                </div>
                <div class="form-group">
                    <label for="reg_number">Registration Number/ID</label>
                    <input type="text" id="reg_number" name="reg_number" value="{{ student.reg_number or '' }}">
                </div>
            </div>
            
            <div class="form-group-row">
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" value="{{ student.dob.strftime('%Y-%m-%d') if student.dob else '' }}">
                </div>
                <div class="form-group">
                    <label for="photo_url">Photo URL</label>
                    <input type="url" id="photo_url" name="photo_url" value="{{ student.photo_url or '' }}">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Academic Information</legend>
            <div class="form-group-row">
                <div class="form-group">
                    <label for="level">Level (Primary, University, etc.)</label>
                    <input type="text" id="level" name="level" value="{{ student.level or '' }}">
                </div>
                <div class="form-group">
                    <label for="course">Course/Major</label>
                    <input type="text" id="course" name="course" value="{{ student.course or '' }}">
                </div>
            </div>

            <div class="form-group-row">
                <div class="form-group">
                    <label for="academic_group">Faculty/Department/Class</label>
                    <input type="text" id="academic_group" name="academic_group" value="{{ student.academic_group or '' }}">
                </div>
                <div class="form-group">
                    <label for="academic_year">Academic Year (e.g., Year 1)</label>
                    <input type="text" id="academic_year" name="academic_year" value="{{ student.academic_year or '' }}">
                </div>
            </div>

            <div class="form-group-row">
                <div class="form-group">
                    <label for="academic_semester_term">Semester/Term</label>
                    <input type="text" id="academic_semester_term" name="academic_semester_term" value="{{ student.academic_semester_term or '' }}">
                </div>
                <div class="form-group">
                    <label for="academic_performance">Academic Score (0-100)</label>
                    <input type="number" step="0.1" min="0" max="100" id="academic_performance" name="academic_performance" value="{{ student.academic_performance or 60.0 }}">
                </div>
            </div>
        </fieldset>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Profile</button>
            <a href="{{ url_for('student_profile', student_id=student.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
